version: '3.9'
services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 10

  ai-model:
    build: ./ai-model
    restart: unless-stopped
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/healthz")']
      interval: 15s
      timeout: 5s
      retries: 8

  server:
    build: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env.example
    environment:
      - MONGODB_URI=mongodb://mongo:27017/cura
      - AI_SERVICE_URL=http://ai-model:8000/predict
      - CLIENT_ORIGIN=http://localhost:5173
      - JWT_SECRET=please_change_me
    depends_on:
      mongo:
        condition: service_healthy
      ai-model:
        condition: service_healthy
    ports:
      - '5000:5000'
    healthcheck:
      test: ['CMD', 'node', '-e', 'fetch("http://127.0.0.1:5000/healthz").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))']
      interval: 15s
      timeout: 5s
      retries: 8

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '5173:80'

volumes:
  mongo_data:
